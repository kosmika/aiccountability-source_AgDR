name: Convert MD to HTML and Generate Sitemap

on:
  push:
    branches: [main]

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pandoc
        run: sudo apt-get install -y pandoc

      - name: Convert all MD to HTML
        run: |
          for f in *.md; do
            TITLE=$(basename "${f%.md}" | tr '-' ' ')
            pandoc "$f" -o "${f%.md}.html" \
              --metadata title="$TITLE" \
              -H <(echo '<meta name="description" content="Agent Decision Record specification and AI accountability infrastructure. Accountability.ai — the measurement standard for AI.">')
          done

      - name: Generate sitemap
        run: |
          echo '<?xml version="1.0" encoding="UTF-8"?>' > sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> sitemap.xml
          echo '  <url><loc>https://accountability.ai/</loc><priority>1.0</priority></url>' >> sitemap.xml
          echo '  <url><loc>https://accountability.ai/sandbox.html</loc><priority>0.9</priority></url>' >> sitemap.xml
          for f in *.html; do
            if [ "$f" != "index.html" ] && [ "$f" != "sandbox.html" ]; then
              echo "  <url><loc>https://accountability.ai/${f}</loc><priority>0.7</priority></url>" >> sitemap.xml
            fi
          done
          echo '</urlset>' >> sitemap.xml

      - name: Commit HTML and sitemap back to repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add *.html sitemap.xml
          git stash
          git pull --rebase origin main
          git stash pop
          git commit -m "Auto-generated HTML and sitemap" || exit 0
          git push

      - name: Trigger DoRoyal deploy
        run: |
          curl -u "${{ secrets.DOROYAL_USER }}:${{ secrets.DOROYAL_PASS }}" \
            "https://royal2.doroyal.com/clientarea.php?action=productdetails&id=833&mg-page=Git&modop=custom&a=deploy&name=Nameaccountability-site"
