name: Convert MD to HTML and Generate Sitemap

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Delete old converted HTML files
        run: |
          find . -maxdepth 1 -name "*.html" ! -name "index.html" ! -name "sandbox.html" ! -name "template.html" -delete

      - name: Create local templates directory
        run: mkdir -p templates

      - name: Copy template to local directory
        run: |
          if [ -f "template.html" ]; then
            cp template.html templates/
            echo "Template copied successfully"
          else
            echo "Warning: template.html not found in workspace"
            # Create a default template if none exists
            echo '<!DOCTYPE html>
            <html>
            <head>
              <meta charset="UTF-8">
              <title>$title$</title>
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <style>
                body { font-family: Arial, sans-serif; line-height: 1.6; padding: 20px; max-width: 800px; margin: 0 auto; }
                code { background: #f4f4f4; padding: 2px 5px; border-radius: 3px; }
                pre { background: #f4f4f4; padding: 10px; border-radius: 5px; overflow-x: auto; }
              </style>
            </head>
            <body>
              <main>
                <h1>$title$</h1>
                $body$
              </main>
            </body>
            </html>' > templates/template.html
          fi

      - name: Convert all MD to HTML
        run: |
          for f in *.md; do
            [ -f "$f" ] || continue
            # Skip README.md if you don't want to convert it
            if [ "$f" = "README.md" ]; then
              echo "Skipping $f"
              continue
            fi
            
            TITLE=$(basename "${f%.md}" | sed 's/-/ /g')
            echo "Converting $f to ${f%.md}.html with title: $TITLE"
            
            pandoc "$f" \
              --from markdown+fenced_code_blocks+backtick_code_blocks+pipe_tables \
              --to html5 \
              --template=template.html \
              --data-dir=./templates \
              --metadata title="$TITLE" \
              --output "${f%.md}.html"
              
            if [ $? -eq 0 ]; then
              echo "✅ Converted: $f -> ${f%.md}.html"
            else
              echo "❌ Failed to convert: $f"
              exit 1
            fi
          done

      - name: Generate sitemap
        run: |
          echo '<?xml version="1.0" encoding="UTF-8"?>' > sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> sitemap.xml
          echo '  <url><loc>https://accountability.ai/</loc><priority>1.0</priority></url>' >> sitemap.xml
          echo '  <url><loc>https://accountability.ai/sandbox.html</loc><priority>0.9</priority></url>' >> sitemap.xml
          
          for f in *.html; do
            [ -f "$f" ] || continue
            if [ "$f" != "index.html" ] && [ "$f" != "sandbox.html" ] && [ "$f" != "template.html" ]; then
              echo "  <url><loc>https://accountability.ai/${f}</loc><priority>0.7</priority></url>" >> sitemap.xml
            fi
          done
          
          echo '</urlset>' >> sitemap.xml
          echo "✅ Sitemap generated with $(grep -c "<url>" sitemap.xml) URLs"

      - name: Commit and push HTML and sitemap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.html sitemap.xml
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-generated HTML and sitemap [skip ci]"
            git push origin main
            echo "✅ Changes committed and pushed"
          fi
