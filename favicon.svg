<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Light blue gradient inside the triangle -->
    <linearGradient id="bg" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%"   stop-color="#d6eef5"/>
      <stop offset="100%" stop-color="#f5fbfd"/>
    </linearGradient>
    <!-- Subtle drop shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#2a8a8a" flood-opacity="0.25"/>
    </filter>
    <!-- Clip triangle shape for the gradient fill -->
    <clipPath id="tri-clip">
      <polygon points="50,7 95,83 5,83"/>
    </clipPath>
  </defs>

  <!-- Triangle fill (gradient) clipped to triangle shape -->
  <rect x="0" y="0" width="100" height="90" fill="url(#bg)" clip-path="url(#tri-clip)"/>

  <!-- Triangle outline — rounded joins, teal stroke -->
  <polygon
    points="50,7 95,83 5,83"
    fill="none"
    stroke="#2e8b84"
    stroke-width="6"
    stroke-linejoin="round"
    filter="url(#shadow)"
  />

  <!-- "G" letterform, centred in upper triangle -->
  <text
    x="50" y="67"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="44"
    font-weight="700"
    fill="#2e8b84"
    text-anchor="middle"
    dominant-baseline="auto"
  >G</text>

  <!-- "AgDR" below the triangle base -->
  <text
    x="50" y="97"
    font-family="Arial, Helvetica, sans-serif"
    font-size="14"
    font-weight="400"
    fill="#a0aab4"
    text-anchor="middle"
    letter-spacing="0.5"
  >AgDR</text>
</svg>
